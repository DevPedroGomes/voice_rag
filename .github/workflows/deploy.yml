name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Placeholder .env (compose precisa p/ parsear env_file; .env real vive na VPS)
        run: cp .env.example .env 2>/dev/null || touch .env
      - name: Build + push (so os servicos buildados, nao upstream)
        run: |
          docker compose build
          docker compose push backend frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            cd /opt/showcase/voice_rag
            if [ -f .deploy-freeze ]; then
              echo "Freeze ativo, abortando deploy"
              exit 1
            fi
            git fetch origin
            git reset --hard origin/main
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
