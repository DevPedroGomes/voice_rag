name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            echo "[deploy] user=$(whoami) host=$(hostname) pwd=$(pwd)"
            cd /opt/showcase/voice_rag
            echo "[deploy] cwd ok: $(pwd)"
            if [ -f .deploy-freeze ]; then
              echo "[deploy] FREEZE active, aborting"
              exit 1
            fi
            echo "[deploy] git fetch..."
            git fetch origin
            echo "[deploy] git reset..."
            git reset --hard origin/main
            echo "[deploy] HEAD now $(git rev-parse --short HEAD)"
            echo "[deploy] docker compose pull..."
            docker compose pull --ignore-pull-failures || true
            echo "[deploy] docker compose up --build..."
            docker compose up -d --build --remove-orphans
            echo "[deploy] cleanup images..."
            docker image prune -f
            echo "[deploy] final state:"
            docker compose ps
