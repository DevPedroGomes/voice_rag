name: Build & push image (VPS auto-pulls)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Placeholder .env (compose precisa p/ parsear env_file; .env real vive na VPS)
        run: cp .env.example .env 2>/dev/null || touch .env
      - name: Build + push (so os servicos buildados, nao upstream)
        run: |
          docker compose build
          docker compose push backend frontend
